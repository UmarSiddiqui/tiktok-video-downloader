<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umazen TikTok Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>

  <div class="container">

    <header>
      <div class="header-top">
        <div class="wordmark">
          <span class="wordmark-dot"></span>
          Umazen TikTok Tools
        </div>
        <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
      <div class="hero">
        <h1>Download &amp; extract<br/><em>anything from TikTok.</em></h1>
        <p class="hero-sub">Highest quality. No watermarks. Instant.</p>
      </div>
    </header>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="download" role="tab" aria-selected="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Video
      </button>
      <button class="tab" data-tab="extract" role="tab" aria-selected="false">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Extract Frames
      </button>
    </div>

    <!-- Download Tab -->
    <section id="tab-download" class="tab-content" role="tabpanel">
      <div class="card">
        <div class="field-group">
          <label for="tiktok-url" class="field-label">Video URL</label>
          <input
            type="url"
            id="tiktok-url"
            class="field-input"
            placeholder="https://www.tiktok.com/@user/video/..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div id="quality-row" class="field-group hidden">
          <label for="quality-select" class="field-label">Quality</label>
          <div class="select-wrap">
            <select id="quality-select" class="field-select"></select>
            <svg class="select-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <button id="download-btn" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>

        <div id="download-status" class="status hidden"></div>
      </div>
    </section>

    <!-- Extract Frames Tab -->
    <section id="tab-extract" class="tab-content hidden" role="tabpanel">
      <div class="card">
        <div class="field-group">
          <label for="video-upload" class="field-label">Video File</label>
          <label for="video-upload" class="file-drop" id="file-drop-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="file-label-text">Click to choose a video file</span>
            <input type="file" id="video-upload" accept="video/*" class="sr-only" />
          </label>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="frame-count" class="field-label">Frames</label>
            <input type="number" id="frame-count" class="field-input" value="5" min="1" max="50" />
          </div>
          <div class="field-group">
            <label for="interval-ms" class="field-label">Interval (ms)</label>
            <input type="number" id="interval-ms" class="field-input" value="1000" min="0" max="60000" />
          </div>
        </div>

        <button id="extract-btn" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Extract Frames
        </button>

        <div id="extract-status" class="status hidden"></div>
      </div>

      <div id="frames-grid" class="frames-grid hidden"></div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
